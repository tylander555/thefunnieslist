<!DOCTYPE html>
<html>
<head>
<title>The Funnieslist</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff4444;
    font-size: 45px;
}

.subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 40px;
}

.card {
    background: #222;
    width: 85%;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 25px;
}

.card img {
    width: 160px;
    height: 90px;
    object-fit: cover;
    display: block;
    border-radius: 8px;
}

.rank {
    color: #ff4444;
    font-size: 35px;
    font-weight: bold;
}

.info h2 {
    margin: 0;
    font-size: 28px;
}

.info p {
    margin: 5px 0;
}
</style>

</head>

<body>

<h1>THE FUNNIESLIST</h1>
<p class="subtitle">
The hardest levels me and my friends have beaten
</p>

<div class="card">
    <div class="rank">#1</div>

    <img src="https://thumbnails.demonlist.org/custom-list-previews/398364.png" alt="Allegiance">

    <div class="info">
        <h2>Allegiance</h2>
        <p>Creator: NikroPlays</p>
        <p>Verifier: Ryan</p>
    </div>
</div>


<div class="card">
    <div class="rank">#2</div>

    <img src="https://thumbnails.demonlist.org/custom-list-previews/646838.png" alt="Hypersonic">

    <div class="info">
        <h2>Hypersonic</h2>
        <p>Creator: Viprin</p>
        <p>Verifier: Ryan</p>
    </div>
</div>

</body>
</html>
