<!DOCTYPE html>
<html>
<head>
<title>The Funnieslist</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff4444;
    font-size: 45px;
}

.subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 40px;
}

.card {
    background: #222;
    width: 85%;
    margin: 20px auto;
    padding: 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
}

.card img {
    width: 160px;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
}

.rank {
    color: #ff4444;
    font-size: 35px;
    font-weight: bold;
    width: 60px;
}

.info h2 {
    margin: 0 0 10px 0;
}

.info p {
    margin: 5px 0;
}
</style>

</head>

<body>

<h1>THE FUNNIESLIST</h1>

<p class="subtitle">
The hardest levels me and my friends have beaten
</p>

<div id="list">
Loading...
</div>


<script>

fetch("levels.json")
.then(response => response.json())
.then(levels => {

    let list = document.getElementById("list");
    list.innerHTML = "";

    levels.forEach(level => {

        list.innerHTML += `

        <div class="card">

            <div class="rank">
                #${level.position}
            </div>

            <img src="https://thumbnails.demonlist.org/${level.preview_url}" loading="lazy">

            <div class="info">
                <h2>${level.name}</h2>
                <p>Creator: ${level.holder}</p>
                <p>Verifier: ${level.verifier}</p>
            </div>

        </div>

        `;

    });

})
.catch(error => {

    document.getElementById("list").innerHTML =
    "<h2>Could not load levels</h2>";

    console.log(error);

});

</script>

</body>
</html>
