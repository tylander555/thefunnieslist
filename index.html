<!DOCTYPE html>
<html>
<head>
<title>The Funnieslist</title>

<style>
body {
    background: #111;
    color: white;

}

h1 {
    text-align: center;
    color: #ff4444;
    font-size: 45px;
}

.subtitle {
    text-align: center;
    color: #aaa;
}

.card {
    background: #222;
    margin: 20px auto;
    padding: 15px;
    border-radius: 12px;
    width: 80%;
    display: flex;
    align-items: center;
    gap: 20px;
}

.card img {
    width: 160px;
    border-radius: 8px;
}

.rank {
    font-size: 35px;
    color: #ff4444;
    font-weight: bold;
}

.info h2 {
    margin: 0;
}
</style>

</head>

        <h2>Allegiance</h2>

    </div>
</div>

<div class="card">

</html>
